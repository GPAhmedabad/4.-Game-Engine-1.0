<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO-AM LEADERBOARD SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    
    <style>
        :root {
            --turf-green: #1a472a;
            --deep-forest: #0d2415;
            --gold: #d4af37;
            --off-white: #f8f9fa;
            --wood: #2c1b0e;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #050a07;
            font-family: 'Montserrat', sans-serif;
            color: var(--off-white);
        }

        /* --- View Containers --- */
        .view {
            display: none;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, var(--turf-green) 0%, var(--deep-forest) 100%);
            border: 30px solid var(--wood);
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .view.active { display: flex; }

        /* --- Lobby Styles --- */
        .lobby-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .lobby-header h1 {
            font-family: 'Bebas Neue';
            font-size: 5rem;
            color: var(--gold);
            letter-spacing: 10px;
            margin: 0;
        }

        .ball-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ball-card {
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--gold);
            padding: 40px;
            width: 250px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .ball-card:hover {
            background: var(--gold);
            color: var(--deep-forest);
            transform: translateY(-10px);
        }

        .ball-card .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .ball-card h3 {
            font-family: 'Bebas Neue';
            font-size: 2rem;
            margin: 0;
            letter-spacing: 2px;
        }

        .ball-stats {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* --- Display Styles --- */
        .header-title {
            position: absolute;
            top: 40px;
            color: var(--gold);
            font-family: 'Bebas Neue';
            font-size: 3rem;
            letter-spacing: 8px;
        }

        /* --- T-Point Scan Cards --- */
        .tpoint-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 95%;
            margin-top: 120px;
            padding: 20px;
            overflow-y: auto;
            max-height: 75vh;
        }

        .tpoint-card {
            background: linear-gradient(180deg, #1a2f21 0%, #0a110b 100%);
            border: 1px solid rgba(212,175,55,0.5);
            border-radius: 8px;
            padding: 24px;
            width: 340px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            animation: cardAppear 0.4s ease-out forwards;
            position: relative;
        }

        .tpoint-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 20px 50px rgba(212,175,55,0.2);
        }

        .tpoint-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.2);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .tpoint-station-label {
            font-family: 'Bebas Neue';
            font-size: 1rem;
            letter-spacing: 3px;
            color: var(--gold);
            display: flex;
            align-items: center;
            opacity: 0.8;
        }

        .tpoint-time {
            font-family: 'Montserrat';
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
        }

        .tpoint-player {
            font-family: 'Bebas Neue';
            font-size: 3.5rem;
            color: var(--gold);
            text-align: center;
            letter-spacing: 5px;
            margin: 15px 0;
            text-transform: uppercase;
            line-height: 1;
        }

        .tpoint-score-box {
            background: rgba(212,175,55,0.05);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            position: relative;
        }

        .tpoint-score-label {
            font-family: 'Montserrat';
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .tpoint-score-value {
            font-family: 'Bebas Neue';
            font-size: 5.5rem;
            color: #fff;
            line-height: 1;
            margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .tpoint-ball-badge {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-family: 'Bebas Neue';
            font-size: 0.8rem;
            color: rgba(212,175,55,0.4);
            letter-spacing: 2px;
        }

        .tpoint-status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gold);
            margin-right: 10px;
            box-shadow: 0 0 10px var(--gold);
            animation: blink 1.5s infinite;
        }

        @keyframes goldPulse {
            0%   { box-shadow: 0 0 0px rgba(212,175,55,0); }
            50%  { box-shadow: 0 0 100px rgba(212,175,55,0.4); }
            100% { box-shadow: 0 0 0px rgba(212,175,55,0); }
        }


        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* --- Goal Celebration Styles --- */
        #goal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(212,175,55,0.2) 0%, rgba(0,0,0,0.95) 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(20px);
            animation: overlayFadeIn 0.5s ease-out forwards;
        }

        .goal-text {
            font-family: 'Bebas Neue';
            font-size: 15rem;
            color: #fff;
            text-shadow: 0 0 50px var(--gold), 0 0 100px var(--gold);
            letter-spacing: 20px;
            margin: 0;
            animation: goalScale 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .goal-player-name {
            font-family: 'Bebas Neue';
            font-size: 5rem;
            color: var(--gold);
            letter-spacing: 10px;
            margin-top: -30px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        #goal-overlay.content-active .goal-text,
        #goal-overlay.content-active .goal-player-name {
            opacity: 1;
        }

        .goal-confetti {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        /* --- Scoring Display in Goal --- */
        .goal-scoring-tally {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 12px;
            padding: 30px;
            width: 500px;
            margin-top: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease-out;
            pointer-events: none;
        }

        .goal-scoring-tally.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .tally-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-family: 'Montserrat';
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .tally-label { color: rgba(255,255,255,0.6); font-weight: 700; }
        .tally-value { font-family: 'Bebas Neue'; font-size: 2rem; }
        .val-plus { color: #2ecc71; }
        .val-minus { color: #ff6b6b; }

        .tally-divider {
            height: 1px;
            background: rgba(212,175,55,0.3);
            margin: 20px 0;
        }

        .tally-total {
            font-size: 1.8rem;
            color: #fff;
        }

        #goal-total-val {
            font-size: 4rem;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold);
        }

        @keyframes overlayFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes goalScale {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.5); }
        }

        .winner-card-celebrate {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1.8) !important;
            z-index: 10001 !important;
            box-shadow: 0 0 100px rgba(212,175,55,1) !important;
            border-width: 3px !important;
            animation: winnerPulse 1s infinite alternate !important;
        }

        @keyframes winnerPulse {
            0% { box-shadow: 0 0 50px rgba(212,175,55,0.5); }
            100% { box-shadow: 0 0 150px rgba(212,175,55,1); }
        }

        .card-exit {
            animation: cardShrink 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important;
            pointer-events: none;
        }

        @keyframes cardShrink {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            100% { transform: scale(0); opacity: 0; filter: blur(20px); }
        }

        /* --- Existing Reception Styles --- */
        .reception-container {
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--gold);
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            width: 500px;
        }

        .reception-container h2 {
            font-family: 'Bebas Neue';
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 30px;
        }

        .reception-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gold);
            color: white;
            font-size: 2rem;
            font-family: 'Montserrat';
            text-align: center;
            margin-bottom: 40px;
            outline: none;
        }

        .assign-btn {
            background: var(--gold);
            color: var(--deep-forest);
            border: none;
            padding: 15px 40px;
            font-family: 'Bebas Neue';
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .assign-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }

        .status-msg {
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* --- Dashboard Nav Styles --- */
        .dashboard-nav {
            position: absolute;
            top: 60px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .nav-btn {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--gold);
            color: var(--gold);
            font-family: 'Bebas Neue';
            font-size: 1.5rem;
            padding: 10px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 5px;
            min-width: 180px;
            text-align: center;
        }

        .nav-btn:hover {
            background: var(--gold);
            color: var(--deep-forest);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .nav-btn.active {
            background: var(--gold);
            color: var(--deep-forest);
        }
    </style>
</head>
<body>

    <div id="lobby-view" class="view active">
        <div class="dashboard-nav">
            <div class="nav-btn" onclick="showView('reception-view')">RECEPTION</div>
            <div class="nav-btn active" onclick="showView('lobby-view')">HOME</div>
            <div class="nav-btn" onclick="showView('display-view')">DASHBOARD</div>
        </div>

        <div class="lobby-header" style="margin-top: 100px;">
            <h1>SELECT YOUR BALL</h1>
            <p id="total-count">CONNECTING TO BALL SERVER...</p>
        </div>
        
        <div id="ball-list" class="ball-grid">
            <!-- Dynamically filled -->
        </div>
    </div>

    <div id="reception-view" class="view">
        <div class="dashboard-nav">
            <div class="nav-btn active" onclick="showView('reception-view')">RECEPTION</div>
            <div class="nav-btn" onclick="showView('lobby-view')">HOME</div>
            <div class="nav-btn" onclick="showView('display-view')">DASHBOARD</div>
        </div>

        <div class="reception-container">
            <h2>NEW PLAYER REGISTRATION</h2>
            <p style="color:rgba(255,255,255,0.5); margin:0 0 20px; font-size:0.85rem; letter-spacing:2px;">ENTER NAME THEN SCAN BALL ON ASSIGNER</p>
            <input type="text" id="player-name" class="reception-input" placeholder="ENTER PLAYER NAME" autocomplete="off">
            <button class="assign-btn" onclick="assignBall()">ASSIGN BALL</button>
            <p id="assign-status" class="status-msg"></p>
        </div>
    </div>

    <div id="display-view" class="view">
        <div class="dashboard-nav">
            <div class="nav-btn" onclick="showView('reception-view')">RECEPTION</div>
            <div class="nav-btn" onclick="showView('lobby-view')">HOME</div>
            <div class="nav-btn active" onclick="showView('display-view')">DASHBOARD</div>
        </div>

        <div id="tpoint-grid" class="tpoint-grid">
            <!-- Scan entries will appear here -->
             <div class="tpoint-waiting-msg" style="color:rgba(255,255,255,0.2); font-family:'Bebas Neue'; font-size:3rem; letter-spacing:10px; margin-top:20vh;">AWAITING SCANS...</div>
        </div>

        <!-- Goal Celebration Overlay -->
        <div id="goal-overlay">
            <h1 class="goal-text">GOAL!</h1>
            <div class="goal-player-name">PLAYER NAME</div>
            
            <div class="goal-scoring-tally">
                <div class="tally-line">
                    <span class="tally-label">BASE SCORE</span>
                    <span class="tally-value val-plus" id="goal-base-val">+0</span>
                </div>
                <div class="tally-line">
                    <span class="tally-label">STROKE PENALTY</span>
                    <span class="tally-value val-minus" id="goal-penalty-val">-0</span>
                </div>
                <div class="tally-line">
                    <span class="tally-label">BONUS POINTS</span>
                    <span class="tally-value val-plus" id="goal-bonus-val">+0</span>
                </div>
                <div class="tally-divider"></div>
                <div class="tally-line tally-total">
                    <span class="tally-label">FINAL SCORE</span>
                    <span class="tally-value" id="goal-total-val">0</span>
                </div>
            </div>

            <div class="goal-confetti" id="goal-confetti"></div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const MQTT_HOST = "broker.hivemq.com";
        const MQTT_PORT = 8000; 
        const MQTT_TOPIC = "golf/stroke/count";
        const ASSIGN_TOPIC = "golf/player/assign/v2"; // New topic for assignments
        const CLIENT_ID = "pro_clubhouse_" + Math.random().toString(16).slice(2, 10);

        // --- API CONFIGURATION ---
        // Change these to your Render URL after deployment (e.g., https://your-app.onrender.com)
        const BASE_API_URL = "http://127.0.0.1:5002"; 
        
        const API_URL = `${BASE_API_URL}/balls`;
        const LOOKUP_URL = `${BASE_API_URL}/lookup`;
        const BONUS_RECORD_URL = `${BASE_API_URL}/record_bonus`;

        let activeBallId = null;
        let discoveredBalls = {}; 
        let verifiedDevices = new Set(); // Devices confirmed by the API
        let pendingPlayerName = null; // Name waiting to be linked to a ball

        const client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, CLIENT_ID);

        // --- MQTT Handlers ---
        client.onMessageArrived = (msg) => {
            try {
                const payloadStr = msg.payloadString;

                // ── BONUS: NFC scan on Device ID3 ────────────────────────────
                if (msg.destinationName === "3/nfc-light/controller/res") {
                    handleBonusScan(payloadStr);
                    return;
                }

                // ── GOAL: NFC scan on Device ID2 ────────────────────────────
                if (msg.destinationName === "2/nfc-light/controller/res") {
                    handleGoalScan(payloadStr);
                    return;
                }

                // ── T-POINT: NFC scan on Device ID1 ──────────────────────────
                if (msg.destinationName === "1/nfc-light/controller/res") {
                    handleTPointScan(payloadStr);
                    return;
                }

                // ── ASSIGNER: NFC scan on Device ID4 ─────────────────────────
                if (msg.destinationName === "4/nfc-light/controller/res") {
                    if (pendingPlayerName) {
                        const status = document.getElementById('assign-status');
                        const assignPayload = JSON.stringify({
                            name: pendingPlayerName,
                            scanned_data: payloadStr
                        });
                        const assignMsg = new Paho.MQTT.Message(assignPayload);
                        assignMsg.destinationName = ASSIGN_TOPIC;
                        client.send(assignMsg);
                        status.innerText = `✅ ${pendingPlayerName.toUpperCase()} REGISTERED! SCANNING: "${payloadStr}"...`;
                        status.style.color = "#00ff00";
                        document.getElementById('player-name').value = "";
                        pendingPlayerName = null;
                    }
                    return;
                }

                // ── Stroke count JSON ─────────────────────────────────────────
                const data = JSON.parse(payloadStr);
                const id = data.device;
                const count = data.count;

                if (!verifiedDevices.has(id)) return;

                if (!discoveredBalls[id]) {
                    discoveredBalls[id] = { device: id, count: count, player_name: "UNASSIGNED" };
                } else {
                    discoveredBalls[id].count = count;
                }

                // Update live dashboard cards if they exist in the grid
                const idMatch = id.match(/id(\d+)/i);
                if (idMatch) {
                    const cardId = "tcard-ID" + idMatch[1];
                    const existingCard = document.getElementById(cardId);
                    if (existingCard) {
                        const scoreDisplay = existingCard.querySelector('.tpoint-score-value');
                        if (scoreDisplay) scoreDisplay.innerText = count;
                    }
                }

                if (!activeBallId) {
                    renderLobby();
                }
            } catch(e) { console.log("MQTT Parse Error:", e); }
        };

        client.connect({
            onSuccess: () => {
                client.subscribe(MQTT_TOPIC);
                client.subscribe("1/nfc-light/controller/res"); // T-Point scans
                client.subscribe("2/nfc-light/controller/res"); // Goal scans
                client.subscribe("3/nfc-light/controller/res"); // Bonus scans
                client.subscribe("4/nfc-light/controller/res"); // Assigner scans
                console.log("MQTT Connected");
            }
        });

        // ── T-Point scan handler ──────────────────────────────────────────────
        async function handleTPointScan(rawNfcContent) {
            console.log("[T-POINT] Scan received:", rawNfcContent);
            const grid = document.getElementById('tpoint-grid');
            
            // Remove waiting message if it exists
            const waitingMsg = grid.querySelector('.tpoint-waiting-msg');
            if (waitingMsg) waitingMsg.remove();

            // Create temporary "Looking up" card
            const tempCard = document.createElement('div');
            tempCard.className = 'tpoint-card';
            tempCard.innerHTML = `
                <div class="tpoint-station"><span class="tpoint-status-dot"></span>T-POINT · DEVICE ID1</div>
                <div class="tpoint-label">Scanning...</div>
                <div class="tpoint-player" style="font-size:2rem; color:rgba(255,255,255,0.3);">LOADING...</div>
                <div class="tpoint-ball">RAW: ${rawNfcContent}</div>
            `;
            grid.prepend(tempCard);

            try {
                const res = await fetch(LOOKUP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scanned_data: rawNfcContent, do_reset: true })
                });

                if (!res.ok) throw new Error("Not found");

                const result = await res.json();
                const name = (result.player_name || "UNASSIGNED").toUpperCase();
                const ballId = (result.ball_id || "").toUpperCase();
                const count = result.count || 0;
                const cardId = "tcard-" + ballId;
                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // CHECK FOR DUPLICATE
                const existing = document.getElementById(cardId);
                if (existing) {
                    existing.querySelector('.tpoint-player').innerText = name;
                    existing.querySelector('.tpoint-score-value').innerText = count;
                    existing.querySelector('.tpoint-time').innerText = timeStr;
                    grid.prepend(existing);
                    existing.classList.remove('pulse');
                    void existing.offsetWidth;
                    existing.classList.add('pulse');
                    tempCard.remove();
                } else {
                    tempCard.id = cardId;
                    tempCard.innerHTML = `
                        <div class="tpoint-card-header">
                            <div class="tpoint-station-label"><span class="tpoint-status-dot"></span>STATION 1</div>
                            <div class="tpoint-time">${timeStr}</div>
                        </div>
                        <div class="tpoint-player">${name}</div>
                        <div class="tpoint-score-box">
                            <span class="tpoint-score-label">FINAL SCORE</span>
                            <div class="tpoint-score-value">${count}</div>
                            <div class="tpoint-ball-badge">${ballId}</div>
                        </div>
                    `;
                    tempCard.classList.add('pulse');
                }

            } catch (err) {
                const errorId = "error-" + rawNfcContent;
                const existingError = document.getElementById(errorId);
                if (existingError) {
                    grid.prepend(existingError);
                    tempCard.remove();
                } else {
                    tempCard.id = errorId;
                    tempCard.innerHTML = `
                        <div class="tpoint-card-header">
                            <div class="tpoint-station-label"><span class="tpoint-status-dot" style="background:#ff6b6b;"></span>ERROR</div>
                            <div class="tpoint-time">SYSTEM</div>
                        </div>
                        <div class="tpoint-player" style="color:#ff6b6b; font-size:2rem;">UNKNOWN</div>
                        <div class="tpoint-score-box">
                            <span class="tpoint-score-label">RAW DATA</span>
                            <div class="tpoint-score-value" style="font-size:2rem;">${rawNfcContent}</div>
                        </div>
                    `;
                }
            }
        }

        // Start discovery immediately (don't wait for MQTT)
        startDiscovery();

        // --- Navigation ---
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            // Sync nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.innerText.toLowerCase() === viewId.split('-')[0].toLowerCase()) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // --- Reception Logic (100% MQTT - no HTTP fetch needed) ---
        function assignBall() {
            const name = document.getElementById('player-name').value.trim();
            const status = document.getElementById('assign-status');
            
            if (!name) {
                status.innerText = "PLEASE ENTER A PLAYER NAME FIRST!";
                status.style.color = "#ff4444";
                return;
            }

            // Store name locally — no HTTP needed
            pendingPlayerName = name;
            status.innerText = `READY ✦ SCAN BALL FOR "${name.toUpperCase()}" ON ASSIGNER...`;
            status.style.color = "var(--gold)";

            // Put Device ID 4 (assigner) into Listening/Read Mode via MQTT
            const topic = "4/nfc-light/controller/cmd";
            const payload = new Uint8Array(1);
            payload[0] = 0x07; // CMD_LISTEN
            const message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            client.send(message);
        }

        // --- Logic Functions ---
        async function startDiscovery() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const totalLabel = document.getElementById('total-count');
                totalLabel.style.color = "var(--gold)"; 
                
                discoveredBalls = {};
                verifiedDevices.clear();

                data.forEach(ball => {
                    discoveredBalls[ball.device] = ball;
                    verifiedDevices.add(ball.device);
                });
                
                renderLobby();
                
                // Refresh every 500ms while in lobby
                if (!activeBallId) {
                    setTimeout(startDiscovery, 500);
                }
            } catch (e) {
                console.error("API Discovery Error:", e);
                document.getElementById('total-count').innerText = "SYSTEM OFFLINE: WAITING FOR BALL SERVER...";
                document.getElementById('total-count').style.color = "#ff4444";
                setTimeout(startDiscovery, 2000);
            }
        }

        function renderLobby() {
            const list = document.getElementById('ball-list');
            const totalLabel = document.getElementById('total-count');
            const keys = Object.keys(discoveredBalls);
            
            totalLabel.innerText = `TOTAL DEVICES ONLINE: ${keys.length}`;
            list.innerHTML = '';

            keys.forEach(id => {
                const displayName = id.replace(/^esp32c3-/i, '').toUpperCase();
                const playerName = discoveredBalls[id].player_name || "UNASSIGNED";
                const card = document.createElement('div');
                card.className = 'ball-card';
                const assigner = discoveredBalls[id].assigner || "SYSTEM";
                card.innerHTML = `
                    <div class="icon">⛳</div>
                    <h3>${displayName}</h3>
                    <div class="player-label" style="color:var(--gold); font-size:0.8rem; margin-top: -10px; margin-bottom: 2px;">${playerName}</div>
                    <div style="font-size: 0.6rem; color: #888; margin-bottom: 8px;">BY: ${assigner}</div>
                    <div class="ball-stats">CURRENT: ${discoveredBalls[id].count}</div>
                `;
                card.onclick = () => selectBall(id);
                list.appendChild(card);
            });
        }

        function selectBall(id) {
            activeBallId = id;
            const displayName = id.replace(/^esp32c3-/i, '').toUpperCase();
            const playerName = discoveredBalls[id].player_name || "GUEST";
            document.getElementById('active-id-label').innerText = `${displayName} | ${playerName}`;
            
            // Use showView so nav buttons stay visible
            showView('display-view');

            // Fullscreen trigger
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
        }

        function updateScoreDisplay(val) {
            const countEl = document.getElementById('count');
            const ballEl = document.getElementById('golf-ball-obj');

            countEl.innerText = val;
            
            // Visual Pop (Faster)
            countEl.style.transition = "none";
            countEl.classList.add('score-bump');
            setTimeout(() => {
                countEl.style.transition = "all 0.15s ease";
                countEl.classList.remove('score-bump');
            }, 150);

            // Ball Flight
            ballEl.classList.remove('animate-shot');
            void ballEl.offsetWidth; // Force reflow
            ballEl.classList.add('animate-shot');
        }

        // ── Goal scan handler ──────────────────────────────────────────────
        async function handleGoalScan(rawNfcContent) {
            console.log("[GOAL] Scan received:", rawNfcContent);
            try {
                const res = await fetch(LOOKUP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scanned_data: rawNfcContent, do_reset: false })
                });
                if (!res.ok) return;

                const result = await res.json();
                const name = (result.player_name || "UNASSIGNED").toUpperCase();
                const ballId = (result.ball_id || "").toUpperCase();
                const count = result.count || 0;
                const hasBonus = result.bonus || false;
                
                showGoalCelebration(name, ballId, count, hasBonus);
            } catch (err) { console.log("Goal Lookup Error:", err); }
        }

        function showGoalCelebration(playerName, ballId, finalScore, hasBonus = false) {
            const overlay = document.getElementById('goal-overlay');
            const tally = overlay.querySelector('.goal-scoring-tally');
            const overlayPlayer = overlay.querySelector('.goal-player-name');
            const cardId = "tcard-" + ballId;
            const originalCard = document.getElementById(cardId);

            // Calculations
            const basePoints = 100;
            const penalty = finalScore * 5;
            const bonus = hasBonus ? 50 : 0;
            const total = basePoints + bonus - penalty;

            overlayPlayer.innerText = playerName;
            overlay.style.display = 'flex';
            overlay.classList.remove('content-active');
            tally.classList.remove('active');

            // 1. Enlarge Card Immediately
            if (originalCard) {
                originalCard.classList.add('winner-card-celebrate');
                originalCard.querySelector('.tpoint-score-value').innerText = finalScore;
            }

            // 2. Minimize after 1.5s
            setTimeout(() => {
                if (originalCard) originalCard.classList.remove('winner-card-celebrate');
            }, 1500);

            // 3. Show Goal Text and Tally after card is out of the way (at 2.1s)
            setTimeout(() => {
                overlay.classList.add('content-active');
                tally.classList.add('active');

                // Start Tally Animation
                animateValue("goal-base-val", 0, basePoints, 1000, "+");
                setTimeout(() => animateValue("goal-penalty-val", 0, penalty, 1000, "-"), 500);
                setTimeout(() => animateValue("goal-bonus-val", 0, bonus, 1000, "+"), 1000);
                setTimeout(() => animateValue("goal-total-val", 0, total, 1500), 1500);
            }, 2100);

            // After 10 seconds total, clear celebration and REMOVE PLAYER
            setTimeout(() => {
                overlay.style.opacity = '0';
                
                if (originalCard) {
                    originalCard.classList.remove('winner-card-celebrate');
                    // Add exit animation
                    originalCard.classList.add('card-exit');
                    
                    // Remove from DOM after animation
                    setTimeout(() => {
                        originalCard.remove();
                        // Also clear from local memory if desired
                        // delete discoveredBalls[ballId]; 
                    }, 800);
                }

                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.style.opacity = '1';
                }, 500);
            }, 10000);
        }

        async function handleBonusScan(rawNfcContent) {
            console.log("[BONUS] Scan received (Silent):", rawNfcContent);
            try {
                await fetch(BONUS_RECORD_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scanned_data: rawNfcContent })
                });
            } catch (err) { console.log("Bonus Record Error:", err); }
        }

        function animateValue(id, start, end, duration, prefix = "") {
            const obj = document.getElementById(id);
            if (!obj) return;
            const range = end - start;
            const minTimer = 50;
            let stepTime = Math.abs(Math.floor(duration / range));
            stepTime = Math.max(stepTime, minTimer);
            const startTime = new Date().getTime();
            const endTime = startTime + duration;
            let timer;

            function run() {
                const now = new Date().getTime();
                const remaining = Math.max((endTime - now) / duration, 0);
                const value = Math.round(end - (remaining * range));
                obj.innerText = prefix + value;
                if (value == end) {
                    clearInterval(timer);
                }
            }

            timer = setInterval(run, stepTime);
            run();
        }
    </script>
